<!DOCTYPE html>
<html>
<head>
    <title>Insurance Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(102,126,234,0.2);
            border-radius: 50%;
        }

        h1 {
            margin-bottom: 15px;
            font-weight: 600;
            color: #333;
        }

        p {
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 8px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .error {
            color: red;
            font-size: 13px;
            text-align: left;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            color: #155724;
            font-weight: 600;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>💡 Insurance Predictor</h1>
    <p>Estimate your medical insurance cost instantly</p>

    <form action="/predict" method="post" onsubmit="return validateForm()">
        <input type="number" name="age" id="age" placeholder="Age" min="1" required>

        <select name="sex">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <input type="number" step="0.1" name="bmi" id="bmi" placeholder="BMI" min="0" required>
        <div id="bmiError" class="error"></div>

        <input type="number" name="children" id="children" placeholder="Number of Children" min="0" required>
        <div id="childrenError" class="error"></div>

        <select name="smoker">
            <option value="yes">Smoker</option>
            <option value="no">Non-Smoker</option>
        </select>

        <select name="region">
            <option value="northeast">Northeast</option>
            <option value="northwest">Northwest</option>
            <option value="southeast">Southeast</option>
            <option value="southwest">Southwest</option>
        </select>

        <button type="submit">🚀 Predict Now</button>
    </form>

    {% if result %}
        <div class="result">
            💰 Estimated Cost: Rs.{{ result }}
        </div>
    {% endif %}

    <div class="footer">
        Built with ❤️ using Machine Learning
    </div>
</div>

<script>
function validateForm() {
    let bmi = document.getElementById("bmi").value;
    let children = document.getElementById("children").value;

    let valid = true;

    if (bmi < 0) {
        document.getElementById("bmiError").innerText = "BMI cannot be negative";
        valid = false;
    } else {
        document.getElementById("bmiError").innerText = "";
    }

    if (children < 0) {
        document.getElementById("childrenError").innerText = "Children cannot be negative";
        valid = false;
    } else {
        document.getElementById("childrenError").innerText = "";
    }

    return valid;
}
</script>

</body>
</html>
